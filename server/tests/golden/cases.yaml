  concern_id: technical_approach
  persona_id: technical_evaluator
  answer: >-
    The CMS is a containerized microservices application running on AWS
    GovCloud. PostgreSQL is the system of record, an event-driven pipeline
    handles the LCS data migration, and we expose a versioned REST API that the
    Payments Engine, Benefits Portal, and data warehouse read case status from.
  expected:
    support_delta: 1
    capped: false
    matched_rows: [approach_cited]
  note: >-
    Concrete, compliant architecture that covers the sub-questions, but no
    staffing/schedule/past-performance evidence -> approach_cited, not
    evidence_backed.

- id: approach_past_performance
  concern_id: past_performance
  persona_id: technical_evaluator
  answer: >-
    On the Veterans Claims Office modernization from 2021 to 2024 we migrated a
