# Golden-set regression cases (task 8).
#
# Each case is a hand-graded exchange. The harness (test_golden.py) runs every
# case 3x against REAL Bedrock extraction -> the pure scoring engine and asserts:
#   1. stability  — all three runs agree with each other (temperature=0 + forced
#                   schema should make extraction deterministic), and
#   2. validity   — the score matches the hand grade below.
#
# The `expected` block is graded against the scoring engine AS BUILT
# (app/pipeline/scoring.py), not against an ideal. Two engine behaviours drive
# most of the combinations here, so keep them in mind when reading expectations:
#   - A crossed red line fires FIRST and alone: delta -2, capped, rows [red_line].
#   - `approach_cited` (+1) fires whenever ANY sub-question is marked full/partial
#     and the turn is not already `evidence_backed`. So an on-topic negative
#     answer (a wrong fact, a contradiction) that still addresses the question
#     nets that -1 against a +1 -> delta 0. That is the engine, not a mistake.
#
# CALIBRATION (step 3, needs AWS creds): expected values are authored from domain
# judgment. Run `pytest tests/golden -m golden -v`; for any case that swings
# across the 3 runs (extraction instability) add a worked exemplar to the
# relevant persona file and re-run; for any case whose stable score disagrees
# with the hand grade, decide whether the grade or the content is wrong. Log any
# case that will not settle.
#
# Coverage: every rubric row (red_line, dodge, unsubstantiated, false_fact,
# contradiction, approach_cited, evidence_backed), 4 red-line crossings, and 2
# Tier-0 contradictions (which require `prior_claims`).

# --- Red-line crossings (fire first, cap the meter) ------------------------

- id: red_line_onprem
  concern_id: technical_approach
  persona_id: technical_evaluator
  answer: >-
    For maximum control over the case data, we would host the modernized CMS
    on-premises in our own accredited data center rather than in a cloud
    environment.
  expected:
    support_delta: -2
    capped: true
    matched_rows: [red_line]
  note: PWS 3.1 forbids on-premises hosting -> concern red line.

