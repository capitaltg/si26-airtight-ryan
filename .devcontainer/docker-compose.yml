# Self-contained compose for the dev container: one dev box (python+node)
# plus its own postgres. Kept separate from the root docker-compose.yml so
# opening the dev container does NOT also spin up the api/web service images.
services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/airtight:cached
    # Keep the container alive; you run uvicorn / npm yourself inside it.
    command: sleep infinity
    # Bedrock creds + model id come from the repo-root .env (gitignored), so a
    # rebuilt dev container picks them up automatically. The DATABASE_URL below
    # overrides .env's localhost value (environment wins over env_file) so the
    # app reaches the compose postgres service by name.
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://airtight:airtight@postgres:5432/airtight
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airtight
      POSTGRES_PASSWORD: airtight
      POSTGRES_DB: airtight
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airtight"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
