services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airtight
      POSTGRES_PASSWORD: airtight
      POSTGRES_DB: airtight
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airtight"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    # Migrations run in the image CMD (see server/Dockerfile), so the schema is
    # brought to head before uvicorn serves — no command override needed here.
    # Bedrock creds + pinned model id come from the repo-root .env (gitignored).
    # The DATABASE_URL override wins over .env's localhost value (environment
    # beats env_file) so the api reaches the compose postgres service by name.
    # For a real deploy, drop the AWS_* lines from .env and use an IAM role.
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://airtight:airtight@postgres:5432/airtight
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: ./frontend
    environment:
      # Vite dev-server proxies /api to the api service inside the compose network.
      VITE_API_TARGET: http://api:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
