services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airtight
      POSTGRES_PASSWORD: airtight
      POSTGRES_DB: airtight
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airtight"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    # Apply migrations before serving so a fresh Postgres has the schema. Without
    # this the app starts but every DB-backed route (e.g. POST /sessions) 500s on
    # "relation does not exist".
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-anthropic.claude-sonnet-4-5-20250929}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      DATABASE_URL: postgresql+psycopg://airtight:airtight@postgres:5432/airtight
      # AWS credentials come from the environment / IAM role. No keys in code.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: ./frontend
    environment:
      # Vite dev-server proxies /api to the api service inside the compose network.
      VITE_API_TARGET: http://api:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
