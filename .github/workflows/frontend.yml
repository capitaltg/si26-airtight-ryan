name: frontend

on:
  push:
    paths:
      - "frontend/**"
      - "package.json"
      - "package-lock.json"
      - ".oxlintrc.json"
      - ".oxfmtrc.json"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "package.json"
      - "package-lock.json"
      - ".oxlintrc.json"
      - ".oxfmtrc.json"
      - ".github/workflows/frontend.yml"

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Root install: frontend is an npm workspace, so deps live at the root.
      - name: Install dependencies
        run: npm ci

      - name: Lint (oxlint)
        run: npx oxlint frontend

      - name: Format check (oxfmt)
        run: npx oxfmt --check frontend

      - name: Build + typecheck
        run: npm run build
